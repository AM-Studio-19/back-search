<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>舊客補色查詢 | AM Beauty Studio</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { corePlugins: { preflight: false } }
    </script>

    <style>
        /* --- 品牌色調（奶油 x 淡粉）--- */
        :root {
            --primary: #F3E1CB;      /* 奶油杏 */
            --primary-dark: #E8CBA3; /* 深奶茶杏 */
            --secondary: #F5D3D7;    /* 淡粉 */
            --secondary-dark: #E7A9B1; /* 深玫瑰粉，按鈕/強調用 */
            --text: #6B5548;         /* 溫暖咖啡棕字 */
            --text-light: #A5907F;
            --bg-color: #FFF9F1;     /* 奶油白底 */
            --card-shadow: 0 10px 30px -10px rgba(231, 169, 177, 0.35);
        }

        /* 全域設定 */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-color);
            background-image: url('bg.jpg');
            background-size: cover;
            background-attachment: fixed;
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            font-size: 16px;
            line-height: 1.6;
            margin: 0; padding: 0;
            padding-bottom: 100px;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
            min-height: 100vh;
        }

        h1, h2, h3 { line-height: 1.4; }

        /* --- 頂部 Header --- */
        .header-section {
            background: linear-gradient(135deg, var(--secondary) 0%, var(--primary) 100%);
            color: var(--text);
            padding: 40px 20px 60px 20px;
            text-align: center;
            border-radius: 0 0 40px 40px;
            position: relative;
            box-shadow: 0 10px 25px rgba(231, 169, 177, 0.3);
            margin-bottom: -40px;
        }
        
        .header-logo { font-size: 1.6rem; font-weight: 800; letter-spacing: 1.5px; margin: 0; line-height: 1.3; }
        .header-sub { font-size: 0.95rem; opacity: 0.85; margin-top: 6px; font-weight: 500; letter-spacing: 0.5px; }

        .container { max-width: 600px; margin: 0 auto; padding: 0 20px; position: relative; z-index: 10; }

        /* --- 查詢結果卡片 --- */
        .result-container { margin-top: 30px; }
        .result-card {
            background: white; border-radius: 20px; padding: 28px 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.06); margin-bottom: 22px;
            border: 1px solid rgba(0,0,0,0.02); animation: slideUp 0.5s ease;
        }
        .result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px; border-bottom: 1px solid #f0f0f0; padding-bottom: 16px; }
        .result-name { font-size: 1.35rem; font-weight: 700; color: var(--text); line-height: 1.4; }

        .info-badges { display: flex; gap: 12px; margin-bottom: 22px; }
        .info-badge { flex: 1; background: var(--bg-color); padding: 14px 10px; border-radius: 12px; text-align: center; border: 1px solid #F2E4D8; }
        .info-label { display: block; font-size: 0.82rem; color: #8A8A8A; margin-bottom: 5px; }
        .info-value { display: block; font-size: 1.1rem; font-weight: 700; color: var(--text); line-height: 1.4; }
        .info-value.highlight { color: #C17E86; }

        /* 價格顯示 */
        .price-box {
            margin-top: 16px; padding: 16px; border-radius: 15px;
            display: flex; justify-content: space-between; align-items: center; gap: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
        }
        .price-box p { font-variant-numeric: tabular-nums; }

        /* 展開收合 */
        .collapsible-content { transition: all 0.4s; max-height: 0; overflow: hidden; opacity: 0; }
        .collapsible-content.expanded { max-height: 1000px; opacity: 1; }
        
        /* 訊息提示 */
        .msg-box { margin-top: 20px; padding: 15px; border-radius: 12px; font-size: 1rem; line-height: 1.6; font-weight: bold; display: none; text-align: center; }
        .msg-error { background: #FEF2F2; color: #DC2626; border: 1px solid #FECACA; }
        .msg-success { background: #ECFDF5; color: #059669; border: 1px solid #A7F3D0; }


        /* 備註標籤樣式 */
        .range-label {
            display: inline-block; font-size: 0.8rem; background-color: var(--primary-dark);
            color: var(--text); padding: 3px 9px; border-radius: 4px; margin-bottom: 5px; font-weight: bold;
        }
        .range-label.free { background-color: var(--secondary); color: var(--text); }

        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    </style>
</head>
<body>

    <!-- Header -->
    <div class="header-section">
        <h1 class="header-logo">AM Beauty Studio</h1>
        <div class="header-sub">專屬補色價格查詢系統</div>
    </div>

    <div class="container">
 <!-- 搜尋卡片區塊 -->
    <div class="bg-white p-6 rounded-2xl shadow-xl shadow-[#F5D3D7]/50 mb-8 border border-white">
      <h2 class="text-2xl font-bold text-center leading-snug mb-2 text-[#6B5548]">霧眉霧唇補色價格查詢</h2>
      <p class="text-center text-gray-500 text-[0.95rem] leading-relaxed mb-6">輸入姓名或電話號碼查詢您目前的補色價格</p>

      <div class="relative">
        <input type="text" id="queryInput" placeholder="例如：林小美 或 0912345678"
               class="w-full p-4 pl-5 rounded-xl bg-[#FFF9F1] border border-[#F2E4D8] text-lg leading-relaxed focus:outline-none focus:ring-2 focus:ring-[#E7A9B1] focus:bg-white transition-all placeholder-gray-500"
               onkeydown="if(event.key === 'Enter') searchRecord()">
      </div>

  <!-- 立即查詢按鈕 (奶油 x 淡粉) -->
      <button onclick="searchRecord()" id="searchButton"
              class="w-full mt-4 p-3.5 bg-gradient-to-r from-[#CB7481] to-[#B85868] hover:from-[#C06674] hover:to-[#A94A5A] text-white font-bold rounded-xl text-lg shadow-lg shadow-[#F5D3D7]/60 transition-all transform active:scale-95 flex justify-center items-center">
        <span>立即查詢</span>
        <svg id="loadingIndicator" class="hidden animate-spin h-5 w-5 text-white ml-2" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
      </button>

     <!-- 查看補色價目表按鈕 (奶油灰系，協調淡粉) -->
      <button onclick="openImageModal()"
              class="w-full mt-3 p-3 border-2 border-[#F2E4D8] text-[#8A7566] font-bold rounded-xl hover:bg-[#FFF9F1] hover:text-[#6B5548] hover:border-[#E8CBA3] transition-all flex justify-center items-center gap-2">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
        查看補色價目表
      </button>

      <div id="messageArea" class="hidden mt-4 text-center p-3 rounded-xl text-sm font-medium animate-pulse"></div>
    </div>

        <!-- 結果顯示區 -->
        <div id="resultsArea" class="result-container"></div>
    </div>

    

    <!-- JavaScript 邏輯 -->
    <script>
        const GAS_API_URL = "https://script.google.com/macros/s/AKfycbx6grwl5DidK6DScAaZLM8udp-Pjn_FrB33bv6ES0JkwAiiIx-xxJHicxANVGH7caSpEg/exec"; 

        function searchRecord() {
            let q = document.getElementById('queryInput').value.trim();
            if(!q) return showMessage('error', '請輸入姓名或電話');
            
            // 手機號去0
            if (/^0\d+/.test(q)) q = q.substring(1);

            const btn = document.getElementById('searchButton');
            const area = document.getElementById('resultsArea');
            
            btn.textContent = '資料查詢中...'; btn.disabled = true; 
            area.innerHTML = '';
            document.getElementById('messageArea').style.display = 'none';

            fetch(`${GAS_API_URL}?q=${encodeURIComponent(q)}`)
                .then(response => response.json())
                .then(res => {
                    if (res.data && res.data.length > 0) {
                        // 1. 排序 (日期新到舊)
                        const sortedData = res.data.sort((a, b) => new Date(b.lastDate) - new Date(a.lastDate));
                        // 2. 過濾重複
                        const uniqueData = [];
                        const seenServices = new Set(); 
                        sortedData.forEach(item => {
                            const key = `${item.name}_${item.service}`;
                            if (!seenServices.has(key)) {
                                uniqueData.push(item);
                                seenServices.add(key);
                            }
                        });

                        if(uniqueData.length > 0) {
                            showMessage('success', `🎉 查詢成功！找到 ${uniqueData.length} 筆資料`);
                            area.innerHTML = uniqueData.map((r, i) => createCard(r, i)).join('');
                        } else {
                            showMessage('error', '查無相關資料');
                        }
                    } else {
                        showMessage('error', '查無資料，請確認輸入是否正確 (或是嘗試用姓名查詢)');
                    }
                })
                .catch(err => {
                    console.error(err);
                    showMessage('error', '系統連線失敗，請稍後再試');
                })
                .finally(() => {
                    btn.textContent = '立即查詢'; 
                    btn.disabled = false;
                });
        }

        function showMessage(type, text) {
            const el = document.getElementById('messageArea');
            el.textContent = text;
            el.className = `msg-box ${type === 'error' ? 'msg-error' : 'msg-success'}`;
            el.style.display = 'block';
        }

     function createCard(r, i) { 
            const cid = `card-${i}`; 
            
            // ✨ 標籤邏輯更新 ✨
            let labels = [];
            const ranges = r.touchUpRanges || [];
            
            if (r.service.includes('眉')) {
                // 霧眉：固定4階
                labels = ['半年內', '6-8個月', '8-12個月', '一年以上'];
            } else if (r.service.includes('唇')) {
                // 霧唇：判斷第一階是否為免費
                if (ranges.length > 0 && ranges[0].price === 0) {
                    // 首次客 (有贈送)
                    labels = ['(贈)3個月內', '半年內', '一年內', '一年以上'];
                } else {
                    // 非首次 (直接從半年開始)
                    labels = ['半年內', '一年內', '一年以上'];
                }
            } else {
                labels = ['第一階', '第二階', '第三階', '第四階'];
            }

            const rangesHtml = ranges.map((t, idx) => {
                const labelText = labels[idx] || '';
                const isFree = t.price === 0;
                const labelHtml = labelText ? `<span class="range-label ${isFree ? 'free' : ''}">${labelText}</span>` : '';

                return `
                <div class="flex justify-between items-center py-3.5 border-b border-gray-100 text-[0.95rem] last:border-0">
                    <div class="flex flex-col gap-0.5">
                        ${labelHtml}
                        <span class="text-gray-600 leading-relaxed">${t.dateRange}</span>
                    </div>
                    <span class="font-bold text-gray-800 text-base tabular-nums">
                        ${t.price === 0 ? '免費' : '$' + t.price}
                    </span>
                </div>`;
            }).join(''); 
            
            return `
            <div class="result-card">
                <div class="result-header">
                    <div>
                        <div class="result-name">${r.name}</div>
                        <span class="text-gray-500 text-sm">(${maskPhoneNumber(r.phone)})</span>
                    </div>
                </div>
                
                <div class="info-badges">
                    <div class="info-badge">
                        <span class="info-label">上次日期</span>
                        <span class="info-value">${r.lastDate||'-'}</span>
                    </div>
                    <div class="info-badge">
                        <span class="info-label">上次項目</span>
                        <span class="info-value highlight">${r.service}</span>
                    </div>
                </div>

                ${r.specialReminder ?
                    `<div class="bg-[#FDF3E7] text-[#9C7A3C] p-3.5 rounded-xl text-[0.95rem] leading-relaxed mb-4 font-medium flex items-start gap-2">
                        <span>💡</span><span>${r.specialReminder}</span>
                     </div>` : ''
                }

                ${getPriceCardHtml(r.currentPriceInfo, r.eyebrowDiscountDate && !checkIsExpired(r.eyebrowDiscountDate))}

                <div style="margin-top:20px;">
                    <button onclick="toggleCollapse('${cid}', this)"
                            style="width:100%; padding:13px; background:#FFF9F1; color:#8A7566; border:none; border-radius:12px; font-size:0.95rem; font-weight:600; cursor:pointer; transition:0.2s;">
                        查看完整價目表 ▼
                    </button>
                    <div id="${cid}" class="collapsible-content bg-[#FFF9F1] px-4 mt-2 rounded-xl">
                        <div class="py-3">${rangesHtml}</div>
                    </div>
                </div>
            </div>`;
        }

        function getPriceCardHtml(info, useOrange) {
            if (!info) return '';
            let p = info.price===0 ? '免費' : (info.price ? `NT$ ${info.price}` : '洽詢');
            let bg = info.price===0 ? 'bg-emerald-600' : (useOrange ? 'bg-[#B8853A]' : 'bg-[#B85868]');
            let theme = info.price===0 ? 'bg-emerald-50 border-emerald-200' : (useOrange ? 'bg-[#FDF3E7] border-[#E8CBA3]' : 'bg-[#FDF0F1] border-[#F5D3D7]');
            let dateText = (info.dateRange || '').replace(/【.*?】/g, '');
            
            return `
            <div class="price-box border ${theme}">
                <div>
                    <h3 class="text-xs font-bold tracking-wide text-gray-500 mb-1.5">目前補色價格</h3>
                    <p class="text-lg font-bold text-gray-800 leading-snug">${dateText}</p>
                </div>
                <span class="shrink-0 px-4 py-2 text-white text-xl font-bold rounded-xl ${bg} shadow-md tabular-nums">${p}</span>
            </div>`;
        }

        function checkIsExpired(d) { if(!d)return false; return new Date() > new Date(d); }
        function maskPhoneNumber(p) { if(!p)return''; let s=String(p).replace(/'/g,'').trim(); return s.length<8?s:s.substring(0,4)+'***'+s.substring(s.length-3); }
        function toggleCollapse(id, btn) { 
            const el = document.getElementById(id); 
            el.classList.toggle('expanded'); 
            btn.textContent = el.classList.contains('expanded') ? '收起完整價目表 ▲' : '查看完整價目表 ▼'; 
            btn.style.background = el.classList.contains('expanded') ? '#F2E4D8' : '#FFF9F1';
        }
        // --- 價目表彈窗控制 ---
  function openImageModal() {
    const modal = document.getElementById('imageModal');
    modal.classList.remove('hidden');
    document.body.style.overflow = 'hidden'; // 防止背景滾動
  }

  function closeImageModal() {
    const modal = document.getElementById('imageModal');
    modal.classList.add('hidden');
    document.body.style.overflow = ''; // 恢復背景滾動
  }
  
  // 按下 ESC 鍵也可以關閉
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeImageModal();
  });
    </script>
    <!-- 價目表彈跳視窗 (Modal) -->
  <div id="imageModal" class="fixed inset-0 z-[100] hidden" role="dialog" aria-modal="true">
    <!-- 黑色背景遮罩 (點擊背景也可關閉) -->
    <div class="absolute inset-0 bg-black/80 backdrop-blur-sm transition-opacity" onclick="closeImageModal()"></div>
    
    <!-- 圖片容器 -->
    <div class="relative z-10 flex items-center justify-center min-h-screen p-4">
      <div class="relative bg-white rounded-lg shadow-2xl max-w-4xl w-full overflow-hidden animate-enter">
        <!-- 關閉按鈕 -->
        <button onclick="closeImageModal()" class="absolute top-2 right-2 z-20 bg-black/50 text-white p-2 rounded-full hover:bg-black/70 transition-colors">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
        
        <!-- 你的價目表圖片 -->
        <img src="https://i.postimg.cc/fR4VQ9Hh/jia-mu-biao-(2).jpg" 
             alt="完整價目表" class="w-full h-auto max-h-[85vh] object-contain mx-auto">
      </div>
    </div>
  </div>
</body>
</html>
